spring.application.name=unibus-app

# Docker: porta 3307 no host (ver docker-compose.yml na raiz do repo)
spring.datasource.url=jdbc:mysql://localhost:3307/unibus
# Docker (docker compose up -d): usuário/senha unibus
spring.datasource.username=root
spring.datasource.password=COLOQUE_SUA_SENHA

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

server.port=8080

# --- API SPPO GPS (SMTR / dados.mobilidade.rio) ---
# Posições dos ônibus do Sistema de Transporte Público por Ônibus.
# Endpoint: GET {base-url}{gps-path}?dataInicial=AAAA-MM-DD HH:MM:SS&dataFinal=AAAA-MM-DD HH:MM:SS
# Referência: https://dados.mobilidade.rio/gps/sppo
unibus.sppo.base-url=https://dados.mobilidade.rio
unibus.sppo.gps-path=/gps/sppo
unibus.sppo.connect-timeout-ms=10000
unibus.sppo.read-timeout-ms=120000
# Janela de consulta GPS para o mapa (segundos)
unibus.sppo.janela-segundos=180

# --- GTFS routes.txt (linha SPPO → route_long_name → pontoPartida / pontoFinal) ---
# route_short_name corresponde ao campo "linha" da API SPPO (ex.: 636).
# route_long_name no formato "Origem - Destino" (ex.: Merck - Saens Peña).
unibus.gtfs.routes.classpath-location=classpath:data/gtfs/routes.txt